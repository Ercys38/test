<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pour toi, Askim ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/lock.css">
<link rel="stylesheet" href="css/video-intro.css">
<link rel="stylesheet" href="css/menu.css">
<link rel="stylesheet" href="css/quiz.css">
<link rel="stylesheet" href="css/memories.css">
<link rel="stylesheet" href="css/letter.css">
<link rel="stylesheet" href="css/surprise.css">
</head>
<body>

<!-- =====================================================================
     ECRAN 1 — ACCUEIL
     Photo de fond : assets/images/hero-nous.jpg (à remplacer)
     ===================================================================== -->
<section id="screen-home" class="screen screen--active" aria-label="Accueil">
  <div class="home__background">
    <img class="home__photo" src="assets/images/hero-nous.jpg" alt=""
         onerror="this.onerror=null;this.src='assets/images/placeholder-photo.svg';">
    <div class="home__overlay"></div>
  </div>

  <div class="home__stars" id="starsField" aria-hidden="true"></div>

  <div class="home__content">
    <p class="home__phrase" id="homePhrase" aria-live="polite"></p>
    <button class="btn btn--gold home__cta" id="btnDiscover" hidden>Découvrir</button>
  </div>
</section>

<!-- =====================================================================
     ECRAN 2 — CODE SECRET
     Le code à modifier se trouve dans js/config.js (SECRET_CODE)
     ===================================================================== -->
<section id="screen-lock" class="screen" aria-label="Code secret">
  <div class="lock__panel texture-orientale">
    <svg class="lock__ornement" viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="14" y="27" width="32" height="24" rx="4"/>
      <path d="M20 27 V18 a10 10 0 0 1 20 0 v9"/>
      <circle cx="30" cy="37" r="3" fill="currentColor" stroke="none"/>
      <path d="M30 40 v5"/>
    </svg>
    <h2 class="lock__title">Un code garde ce trésor…</h2>

    <div class="lock__display" id="lockDisplay">
      <span class="lock__digit" data-index="0"></span>
      <span class="lock__digit" data-index="1"></span>
      <span class="lock__digit" data-index="2"></span>
      <span class="lock__digit" data-index="3"></span>
    </div>
    <p class="lock__message" id="lockMessage" aria-live="polite"></p>

    <div class="lock__keypad" id="lockKeypad">
      <button class="lock__key" type="button" data-value="1">1</button>
      <button class="lock__key" type="button" data-value="2">2</button>
      <button class="lock__key" type="button" data-value="3">3</button>
      <button class="lock__key" type="button" data-value="4">4</button>
      <button class="lock__key" type="button" data-value="5">5</button>
      <button class="lock__key" type="button" data-value="6">6</button>
      <button class="lock__key" type="button" data-value="7">7</button>
      <button class="lock__key" type="button" data-value="8">8</button>
      <button class="lock__key" type="button" data-value="9">9</button>
      <button class="lock__key lock__key--action" type="button" data-value="clear" aria-label="Effacer">⌫</button>
      <button class="lock__key" type="button" data-value="0">0</button>
      <span class="lock__key lock__key--action" aria-hidden="true" style="pointer-events:none;">❤</span>
    </div>
  </div>
</section>

<!-- =====================================================================
     ECRAN 3 — PETITE VIDEO
     Fichier à remplacer : assets/video/message-intro.mp4
     ===================================================================== -->
<section id="screen-video-intro" class="screen" aria-label="Un petit mot en vidéo">
  <div class="video-frame">
    <span class="video-frame__coin video-frame__coin--tl" aria-hidden="true"></span>
    <span class="video-frame__coin video-frame__coin--tr" aria-hidden="true"></span>
    <span class="video-frame__coin video-frame__coin--bl" aria-hidden="true"></span>
    <span class="video-frame__coin video-frame__coin--br" aria-hidden="true"></span>
    <div class="video-frame__inner">
      <video id="introVideo" class="video-frame__media" controls playsinline preload="metadata"
             poster="assets/images/placeholder-photo.svg">
        <source src="assets/video/message-intro.mp4" type="video/mp4">
      </video>
    </div>
  </div>
  <button class="btn btn--gold" id="btnContinueAfterVideo" hidden>Continuer</button>
  <button class="video-frame__skip" id="introSkip" type="button">Passer</button>
</section>

<!-- =====================================================================
     ECRAN 4 — MENU PRINCIPAL
     ===================================================================== -->
<section id="screen-menu" class="screen" aria-label="Menu principal">
  <h2 class="menu__title">Que veux-tu découvrir, Askim ?</h2>

  <div class="menu__grid">
    <button class="menu__item" id="menuItemQuiz" type="button"
            data-target="screen-quiz" data-done-key="quizDone">
      <svg class="menu__object" viewBox="0 0 100 70" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 46 Q8 30 28 26 Q26 14 42 12 Q60 10 66 22 Q84 22 88 34 Q90 42 78 44 L64 44"/>
        <ellipse cx="44" cy="48" rx="24" ry="6"/>
        <path d="M40 12 Q40 4 50 6"/>
        <path d="M82 12 l3 5 M90 18 l3 4 M76 8 l2 5" stroke-width="2"/>
      </svg>
      <span class="menu__label">Notre journée</span>
      <span class="menu__status" data-status></span>
      <span class="menu__lockmsg" aria-live="polite"></span>
    </button>

    <button class="menu__item" id="menuItemMemories" type="button"
            data-target="screen-memories" data-done-key="memoriesDone" data-requires="quizDone">
      <svg class="menu__object" viewBox="0 0 100 80" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" aria-hidden="true">
        <path d="M10 14 Q50 44 90 14"/>
        <path d="M30 24 L26 46"/><circle cx="24" cy="52" r="7" fill="currentColor" stroke="none" opacity="0.25"/><circle cx="24" cy="52" r="7"/>
        <path d="M50 32 L50 54"/><circle cx="50" cy="60" r="8" fill="currentColor" stroke="none" opacity="0.25"/><circle cx="50" cy="60" r="8"/>
        <path d="M70 24 L74 46"/><circle cx="76" cy="52" r="7" fill="currentColor" stroke="none" opacity="0.25"/><circle cx="76" cy="52" r="7"/>
      </svg>
      <span class="menu__label">Nos souvenirs</span>
      <span class="menu__status" data-status></span>
      <span class="menu__lockmsg" aria-live="polite"></span>
    </button>

    <button class="menu__item" id="menuItemLetter" type="button"
            data-target="screen-letter" data-done-key="letterDone" data-requires="memoriesDone">
      <svg class="menu__object" viewBox="0 0 100 90" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="30" y="46" width="30" height="22" rx="2" transform="rotate(-8 45 57)" opacity="0.85"/>
        <ellipse cx="50" cy="34" rx="26" ry="30"/>
        <ellipse cx="50" cy="34" rx="19" ry="23"/>
        <path d="M50 64 L50 82"/>
        <path d="M42 82 L58 82"/>
      </svg>
      <span class="menu__label">Une lettre pour toi</span>
      <span class="menu__status" data-status></span>
      <span class="menu__lockmsg" aria-live="polite"></span>
    </button>

    <button class="menu__item" id="menuItemSurprise" type="button"
            data-target="screen-surprise" data-done-key="surpriseSeen" data-requires="letterDone" data-time-gated="true">
      <svg class="menu__object" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 90 V46 Q20 18 50 10 Q80 18 80 46 V90 Z"/>
        <path d="M50 10 V90 M20 55 H80"/>
        <path d="M35 30 Q50 22 65 30" opacity="0.6"/>
        <circle cx="38" cy="70" r="1.6" fill="currentColor" stroke="none"/>
        <circle cx="62" cy="75" r="1.6" fill="currentColor" stroke="none"/>
        <circle cx="50" cy="35" r="1.6" fill="currentColor" stroke="none"/>
      </svg>
      <span class="menu__label">Dernière surprise</span>
      <span class="menu__status" data-status></span>
      <span class="menu__lockmsg" aria-live="polite"></span>
    </button>
  </div>

  <svg class="menu__jasmine silhouette-princesse" viewBox="0 0 120 160" fill="currentColor" aria-hidden="true" style="color:var(--dore-clair);">
    <circle cx="60" cy="30" r="15"/>
    <ellipse cx="60" cy="13" rx="8" ry="6"/>
    <path d="M40 20 Q60 6 80 20 L74 26 Q60 16 46 26 Z"/>
    <path d="M45 45 L75 45 L95 150 Q60 165 25 150 Z"/>
    <path d="M38 50 Q10 70 18 110 Q22 90 42 72 Z"/>
    <path d="M82 50 Q110 70 102 110 Q98 90 78 72 Z"/>
  </svg>
</section>

<!-- =====================================================================
     PARTIE 1 — QUIZ « Notre journée »
     Questions/réponses modifiables dans js/config.js
     ===================================================================== -->
<section id="screen-quiz" class="screen" aria-label="Notre journée">
  <button class="btn btn--ghost btn-return-menu" type="button">← Menu</button>

  <div class="quiz__card" id="quizCard"></div>

  <div class="quiz__final" id="quizFinal" hidden>
    <p class="quiz__final-text"></p>
    <button class="btn btn--gold btn-return-menu" type="button">Retour au menu</button>
  </div>

  <div class="quiz__petals" id="quizPetals" aria-hidden="true"></div>
</section>

<!-- =====================================================================
     PARTIE 2 — NOS SOUVENIRS (frise horizontale)
     Contenu modifiable dans js/config.js (CONFIG.MEMORIES)
     ===================================================================== -->
<section id="screen-memories" class="screen" aria-label="Nos souvenirs">
  <div class="memories__toolbar">
    <button class="btn btn--ghost btn-return-menu" type="button">← Menu</button>
    <button class="memories__sound-toggle" id="soundToggle" type="button" aria-pressed="false" aria-label="Couper / remettre le son">🔊</button>
  </div>

  <div class="memories__track" id="memoriesTrack"></div>

  <audio id="bgMusic" src="assets/audio/musique-souvenirs.mp3" loop preload="none"></audio>
</section>

<!-- =====================================================================
     PARTIE 3 — LA LETTRE
     Texte modifiable dans js/config.js (CONFIG.LETTER_TEXT)
     ===================================================================== -->
<section id="screen-letter" class="screen" aria-label="Une lettre pour toi">
  <svg class="letter__jasmine silhouette-princesse" viewBox="0 0 120 160" fill="currentColor" aria-hidden="true" style="color:var(--dore-clair);">
    <circle cx="60" cy="30" r="15"/>
    <ellipse cx="60" cy="13" rx="8" ry="6"/>
    <path d="M40 20 Q60 6 80 20 L74 26 Q60 16 46 26 Z"/>
    <path d="M45 45 L75 45 L95 150 Q60 165 25 150 Z"/>
    <path d="M38 50 Q10 70 18 110 Q22 90 42 72 Z"/>
    <path d="M82 50 Q110 70 102 110 Q98 90 78 72 Z"/>
  </svg>

  <div class="envelope" id="envelope" role="button" tabindex="0" aria-label="Ouvrir l'enveloppe">
    <div class="envelope__back"></div>
    <div class="envelope__letter">
      <p class="envelope__text" id="letterText"></p>
    </div>
    <div class="envelope__flap"></div>
    <div class="envelope__seal">❤</div>
  </div>
  <p class="letter__hint" id="letterHint">Touche l'enveloppe…</p>

  <button class="btn btn--gold btn-return-menu" id="btnLetterDone" type="button" hidden>Retour au menu</button>
</section>

<!-- =====================================================================
     PARTIE 4 — DERNIERE SURPRISE
     Heure de déblocage modifiable dans js/config.js
     Vidéo à remplacer : assets/video/surprise-finale.mp4
     ===================================================================== -->
<section id="screen-surprise" class="screen" aria-label="Dernière surprise">
  <button class="btn btn--ghost btn-return-menu" type="button">← Menu</button>

  <div class="surprise__parchment texture-orientale">
    <p class="surprise__text"></p>
  </div>

  <div class="video-frame">
    <span class="video-frame__coin video-frame__coin--tl" aria-hidden="true"></span>
    <span class="video-frame__coin video-frame__coin--tr" aria-hidden="true"></span>
    <span class="video-frame__coin video-frame__coin--bl" aria-hidden="true"></span>
    <span class="video-frame__coin video-frame__coin--br" aria-hidden="true"></span>
    <div class="video-frame__inner">
      <video id="finalVideo" class="video-frame__media" controls playsinline preload="metadata"
             poster="assets/images/placeholder-photo.svg">
        <source src="assets/video/surprise-finale.mp4" type="video/mp4">
      </video>
    </div>
  </div>
</section>

<!-- Polices Google Fonts (nécessite une connexion internet chez la personne qui ouvre le site) -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Marcellus&family=Dancing+Script:wght@500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<script src="js/config.js"></script>
<script src="js/app-core.js"></script>
<script src="js/home.js"></script>
<script src="js/lock.js"></script>
<script src="js/video-intro.js"></script>
<script src="js/menu.js"></script>
<script src="js/quiz.js"></script>
<script src="js/memories.js"></script>
<script src="js/letter.js"></script>
<script src="js/surprise.js"></script>
<script src="js/main.js"></script>
</body>
</html>
